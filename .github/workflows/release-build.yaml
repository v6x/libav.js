name: release-build
run-name: Build libav.js dist for ${{ github.ref_name }}
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: test "v$(node -p "require('./package.json').version")" = "${{ github.ref_name }}"
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Install system build tools
        run: sudo apt-get update && sudo apt-get install -y m4 pkg-config meson ninja-build
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Generate Makefile
        run: npm run generate-makefile
      - name: Fetch sources
        run: make extract
      - name: Build vrew variant
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: libav-vrew-dist-${{ github.ref_name }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
